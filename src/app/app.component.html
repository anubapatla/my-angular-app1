<h1>Employee Directory</h1>
<ul>
    @for (emp of employees; track $index){
        <li>employee: {{emp.name}}</li>
        <button (click)="showDetails(emp.id)">Show Details</button>
        <div>
            @if(emp.id=== empId){
                <p>Id: {{emp.id}}</p>
                <p>Department: {{emp.department}}</p>
                <p>Location: {{emp.location}}</p>
                <p>Phone: {{emp.phone}}</p>
            }
        </div>
    }
</ul>
